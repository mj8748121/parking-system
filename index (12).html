<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>駐車場予約システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6fb; --surface: #ffffff; --surface2: #f0f2f8; --border: #dde1ef;
    --accent: #3b7ef0; --accent2: #6c44f4; --green: #1ab97a; --red: #e04444;
    --yellow: #d4a000; --text: #1a1d2e; --text2: #5a6080; --text3: #9ea8c0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:40px 40px; opacity:0.15; pointer-events:none; z-index:0; }
  .container { max-width:960px; margin:0 auto; padding:32px 20px 60px; position:relative; z-index:1; }
  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; padding-bottom:20px; border-bottom:1px solid var(--border); }
  .logo-main { font-size:20px; font-weight:700; letter-spacing:0.08em; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .logo-sub { font-size:11px; color:var(--text3); letter-spacing:0.15em; font-family:'DM Mono',monospace; margin-top:2px; }
  .date-text { font-family:'DM Mono',monospace; font-size:13px; color:var(--text2); }

  .loading-overlay { position:fixed; inset:0; background:rgba(244,246,251,0.92); z-index:300; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
  .loading-overlay.hidden { display:none; }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-size:14px; color:var(--text2); }

  .user-bar { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 16px; margin-bottom:8px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .user-bar-label { font-size:12px; color:var(--text3); white-space:nowrap; }
  .user-bar select { background:transparent; border:none; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:14px; font-weight:500; outline:none; cursor:pointer; flex:1; }
  .user-avatar { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:white; flex-shrink:0; }
  .user-manage-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text2); width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
  .user-manage-btn:hover { background:var(--border); color:var(--text); }

  .panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:12px; display:none; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .panel.open { display:block; animation:fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .panel-title { font-size:13px; font-weight:600; color:var(--text2); letter-spacing:0.1em; margin-bottom:14px; }

  .user-list { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; max-height:220px; overflow-y:auto; }
  .user-item { display:flex; align-items:center; gap:10px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:8px 12px; }
  .user-item-name { flex:1; font-size:14px; }
  .user-item-role { font-size:10px; padding:2px 7px; border-radius:20px; white-space:nowrap; }
  .role-staff { background:rgba(59,126,240,0.1); color:var(--accent); border:1px solid rgba(59,126,240,0.3); }
  .role-part { background:rgba(108,68,244,0.1); color:var(--accent2); border:1px solid rgba(108,68,244,0.3); }
  .user-item-btn { background:none; border:1px solid var(--border); color:var(--text3); width:26px; height:26px; border-radius:6px; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .user-item-btn:hover { color:var(--red); border-color:rgba(224,68,68,0.4); }
  .add-row { display:flex; gap:8px; flex-wrap:wrap; }
  .add-row input, .add-row select { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:8px; font-family:'Noto Sans JP',sans-serif; font-size:13px; outline:none; }
  .add-row input { flex:1; min-width:150px; }
  .add-row input:focus, .add-row select:focus { border-color:var(--accent); }
  .add-btn { background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; color:white; padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px; font-family:'Noto Sans JP',sans-serif; white-space:nowrap; }
  .add-btn:hover { opacity:0.88; }

  .admin-toggle-btn { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text2); padding:10px 16px; border-radius:10px; cursor:pointer; font-size:13px; font-family:'Noto Sans JP',sans-serif; margin-bottom:8px; text-align:left; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .admin-toggle-btn:hover { background:var(--surface2); }
  .admin-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
  .admin-row select, .admin-row input { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:8px; font-family:'Noto Sans JP',sans-serif; font-size:13px; outline:none; flex:1; }
  .abtn { border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-size:12px; font-family:'Noto Sans JP',sans-serif; white-space:nowrap; }
  .abtn-red { background:rgba(224,68,68,0.12); color:var(--red); border:1px solid rgba(224,68,68,0.3); }
  .abtn-green { background:rgba(26,185,122,0.12); color:var(--green); border:1px solid rgba(26,185,122,0.3); }
  .booking-list { display:flex; flex-direction:column; gap:6px; margin-top:8px; max-height:180px; overflow-y:auto; }
  .booking-item { display:flex; align-items:center; gap:10px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:12px; }
  .booking-item-info { flex:1; color:var(--text2); }
  .booking-item-del { background:none; border:1px solid var(--border); color:var(--text3); width:24px; height:24px; border-radius:6px; cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; }
  .booking-item-del:hover { color:var(--red); border-color:rgba(224,68,68,0.4); }

  .date-nav { display:flex; align-items:center; gap:12px; margin-bottom:24px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 16px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .date-nav-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); width:36px; height:36px; border-radius:8px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .date-nav-btn:hover { background:var(--border); }
  .current-date { font-size:18px; font-weight:500; flex:1; text-align:center; }
  .date-picker-input { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:8px; font-family:'DM Mono',monospace; font-size:13px; cursor:pointer; }

  .stats-bar { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
  .stat { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; text-align:center; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .stat-num { font-family:'DM Mono',monospace; font-size:22px; font-weight:500; }
  .stat-num.green{color:var(--green);} .stat-num.red{color:var(--red);} .stat-num.blue{color:var(--accent);}
  .stat-label { font-size:10px; color:var(--text3); margin-top:2px; }

  .legend { display:flex; gap:16px; margin-bottom:28px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text2); }
  .legend-dot { width:10px; height:10px; border-radius:50%; }

  .section { margin-bottom:32px; }
  .section-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .section-title { font-size:13px; font-weight:500; letter-spacing:0.12em; color:var(--text2); text-transform:uppercase; }
  .section-line { flex:1; height:1px; background:var(--border); }
  .section-badge { font-family:'DM Mono',monospace; font-size:10px; background:var(--surface2); border:1px solid var(--border); color:var(--text3); padding:2px 8px; border-radius:20px; }

  .parking-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:12px; }
  .spot { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .spot::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:14px 14px 0 0; }
  .spot.available::before{background:var(--green);}
  .spot.mine::before{background:var(--accent);}
  .spot.taken::before{background:var(--red);}
  .spot.disabled::before{background:var(--text3);}
  .spot.available:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,185,122,0.12);}
  .spot.mine:hover{border-color:var(--accent);transform:translateY(-2px);}
  .spot.taken{opacity:0.55;cursor:not-allowed;}
  .spot.disabled{opacity:0.4;cursor:not-allowed;}
  .spot-number{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;line-height:1;margin-bottom:6px;}
  .spot.available .spot-number{color:var(--text);}
  .spot.mine .spot-number{color:var(--accent);}
  .spot.taken .spot-number,.spot.disabled .spot-number{color:var(--text3);}
  .spot-label{font-size:11px;color:var(--text2);margin-bottom:10px;min-height:14px;}
  .spot-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500;margin-bottom:2px;}
  .tag-kei{background:rgba(108,68,244,0.1);color:var(--accent2);border:1px solid rgba(108,68,244,0.3);}
  .tag-normal{background:rgba(59,126,240,0.1);color:var(--accent);border:1px solid rgba(59,126,240,0.3);}
  .tag-time{background:rgba(212,160,0,0.1);color:var(--yellow);border:1px solid rgba(212,160,0,0.3);}
  .spot-user{margin-top:10px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;}
  .spot-mine-badge{margin-top:6px;font-size:11px;color:var(--accent);font-weight:500;}
  .disabled-badge{margin-top:10px;font-size:11px;color:var(--text3);font-weight:500;}
  .time-slots{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap;}
  .time-slot{font-size:9px;padding:2px 5px;border-radius:4px;font-family:'DM Mono',monospace;background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
  .time-slot.booked{background:rgba(224,68,68,0.1);color:var(--red);border-color:rgba(224,68,68,0.3);}
  .time-slot.my-slot{background:rgba(59,126,240,0.1);color:var(--accent);border-color:rgba(59,126,240,0.3);}
  .spot-photo{width:100%;height:80px;object-fit:cover;border-radius:8px;margin-top:10px;cursor:pointer;}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.active{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:440px;animation:modalIn 0.2s ease;max-height:90vh;overflow-y:auto;}
  @keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  .modal-title{font-size:18px;font-weight:700;margin-bottom:4px;}
  .modal-subtitle{font-size:13px;color:var(--text2);margin-bottom:24px;}
  .form-group{margin-bottom:16px;}
  .form-label{font-size:12px;color:var(--text2);letter-spacing:0.1em;margin-bottom:6px;display:block;}
  .form-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;}
  .form-input:focus{border-color:var(--accent);}
  .time-range{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;}
  .time-range-sep{color:var(--text3);text-align:center;}
  .modal-actions{display:flex;gap:10px;margin-top:24px;}
  .btn{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;font-family:'Noto Sans JP',sans-serif;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;}
  .btn-primary:hover{opacity:0.9;}
  .btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
  .btn-danger{background:rgba(224,68,68,0.12);color:var(--red);border:1px solid rgba(224,68,68,0.3);}

  .photo-modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
  .photo-modal.active{display:flex;}
  .photo-modal img{max-width:100%;max-height:90vh;border-radius:12px;}

  .toast{position:fixed;bottom:30px;right:30px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:10px;font-size:14px;z-index:200;transform:translateY(80px);opacity:0;transition:all 0.3s;box-shadow:0 4px 20px rgba(0,0,0,0.12);}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.success{border-color:var(--green);}
  .toast.error{border-color:var(--red);}

  @media(max-width:600px){
    .parking-grid{grid-template-columns:repeat(2,1fr);}
    header{flex-direction:column;align-items:flex-start;gap:8px;}
    .admin-row{flex-direction:column;}
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">読み込み中...</div>
</div>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-main">&#x1F17F; 駐車場予約</div>
      <div class="logo-sub">PARKING RESERVATION SYSTEM</div>
    </div>
    <div class="date-text" id="clock">--:--:--</div>
  </header>

  <div class="user-bar">
    <div class="user-avatar" id="userInitial">？</div>
    <div class="user-bar-label">ログイン中：</div>
    <select id="userSelect" onchange="changeUser()"></select>
    <button class="user-manage-btn" onclick="togglePanel('userPanel')" title="メンバー管理">&#9881;</button>
  </div>

  <div class="panel" id="userPanel">
    <div class="panel-title">&#x1F465; メンバー管理</div>
    <div class="user-list" id="userList"></div>
    <div class="add-row">
      <input type="text" id="newUserName" placeholder="名前（例：山本 先生）" maxlength="20">
      <select id="newUserRole"><option value="staff">社員</option><option value="part">バイト</option></select>
      <button class="add-btn" onclick="addUser()">+ 追加</button>
    </div>
  </div>

  <button class="admin-toggle-btn" onclick="togglePanel('adminPanel')">&#x1F6E0; 管理パネル（使用不可設定・予約削除・写真登録）</button>
  <div class="panel" id="adminPanel">
    <div class="panel-title">&#x1F6AB; 駐車場の使用不可設定</div>
    <div class="admin-row">
      <select id="adminSpotSelect"></select>
      <button class="abtn abtn-red" onclick="setSpotDisabled(true)">使用不可にする</button>
      <button class="abtn abtn-green" onclick="setSpotDisabled(false)">使用可に戻す</button>
    </div>
    <div class="panel-title">&#x1F5D1; 予約の削除</div>
    <div class="admin-row">
      <select id="adminBookingSpot" onchange="loadAdminBookings()"></select>
    </div>
    <div class="booking-list" id="adminBookingList"><div style="color:var(--text3);font-size:13px;text-align:center;padding:10px;">駐車場を選択してください</div></div>
    <div class="panel-title" style="margin-top:16px;">&#x1F4F7; 駐車場の写真登録</div>
    <div class="admin-row" style="flex-direction:column;align-items:flex-start;">
      <select id="adminPhotoSpot" style="width:100%;" onchange="updatePhotoPreview()"></select>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <label style="background:var(--accent);color:white;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;">
          &#x1F4F7; 写真を選択
          <input type="file" id="photoUpload" accept="image/*" style="display:none;" onchange="uploadSpotPhoto()">
        </label>
        <button class="abtn abtn-red" onclick="deleteSpotPhoto()">写真を削除</button>
      </div>
      <div id="photoPreview" style="width:100%;margin-top:8px;"></div>
    </div>
  </div>

  <div class="date-nav">
    <button class="date-nav-btn" onclick="changeDate(-1)">&#8249;</button>
    <div class="current-date" id="currentDateDisplay"></div>
    <input type="date" class="date-picker-input" id="datePicker" onchange="setDate(this.value)">
    <button class="date-nav-btn" onclick="changeDate(1)">&#8250;</button>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-num green" id="statAvail">-</div><div class="stat-label">空き</div></div>
    <div class="stat"><div class="stat-num red" id="statTaken">-</div><div class="stat-label">使用中</div></div>
    <div class="stat"><div class="stat-num blue" id="statMine">-</div><div class="stat-label">自分の予約</div></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>空き</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>自分の予約</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>予約済み</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>時間制限あり</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--text3)"></div>使用不可</div>
  </div>

  <div id="parkingContent"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-subtitle" id="modalSubtitle"></div>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<div class="photo-modal" id="photoModal" onclick="closePhotoModal()">
  <img id="photoModalImg" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->

const SPOTS = [

  { id:2,  num:'\u2461', name:'\u6587\u6b8a1\u968e \u2461\u756a', area:'\u6587\u6b8a1\u968e', type:'normal', timeLimit:'18:00\uff5e', note:'18:00\u4ee5\u964d\u306e\u307f' },
  { id:3,  num:'\u2462', name:'\u6587\u6b8a1\u968e \u2462\u756a', area:'\u6587\u6b8a1\u968e', type:'normal' },
  { id:4,  num:'\u2463', name:'\u6587\u6b8a1\u968e \u2463\u756a', area:'\u6587\u6b8a1\u968e', type:'normal' },
  { id:5,  num:'\u2464', name:'\u6587\u6b8a1\u968e \u2464\u756a', area:'\u6587\u6b8a1\u968e', type:'normal' },
  { id:6,  num:'\u2465', name:'\u6587\u6b8a\u5730\u4e0b 403', area:'\u6587\u6b8a\u5730\u4e0b', type:'kei', note:'403\u53f7\u5ba4\u524d' },
  { id:7,  num:'\u2466', name:'\u6587\u6b8a\u5730\u4e0b 505', area:'\u6587\u6b8a\u5730\u4e0b', type:'normal', note:'505\u53f7\u5ba4\u524d' },
  { id:8,  num:'\u2467', name:'\u6587\u6b8a\u96e2\u308c\uff084\u756a\uff09', area:'\u6587\u6b8a\u5730\u4e0b', type:'normal', note:'\u96e2\u308c 4\u756a' },
  { id:9,  num:'\u2468', name:'\u6587\u6b8a\u5411\u304b\u3044', area:'\u6587\u6b8a\u5411\u304b\u3044', type:'kei', timeLimit:'18:30\uff5e', note:'18:30\u4ee5\u964d\u306e\u307f' },
  { id:10, num:'\u2469', name:'\u304b\u304e\u304b\u3063\u3053\u6a2a \u2469\u756a', area:'\u304b\u304e\u304b\u3063\u3053', type:'normal' },
  { id:11, num:'\u246a', name:'\u304b\u304e\u304b\u3063\u3053\u6a2a \u246a\u756a', area:'\u304b\u304e\u304b\u3063\u3053', type:'normal' },
  { id:12, num:'\u246b', name:'\u304b\u304e\u304b\u3063\u3053\u6a2a \u246b\u756a', area:'\u304b\u304e\u304b\u3063\u3053', type:'normal' },
  { id:13, num:'\u246c', name:'\u304b\u304e\u304b\u3063\u3053\u6a2a \u246c\u756a', area:'\u304b\u304e\u304b\u3063\u3053', type:'normal' },
  { id:14, num:'\u246c', name:'\u304b\u304e\u304b\u3063\u3053\u96e2\u308c \u246c\u756a', area:'\u304b\u304e\u304b\u3063\u3053\u96e2\u308c', type:'normal', note:'\u96e2\u308c' },
];

let bookings = [];
let members = [];
let disabledSpots = {};
let currentUser = '';
let currentDate = new Date();
currentDate.setHours(0,0,0,0);

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ===== FIREBASE CRUD =====
async function loadMembers() {
  const snap = await getDocs(collection(db,'members'));
  members = snap.docs.map(d=>({id:d.id,...d.data()}));
  members.sort((a,b)=>a.createdAt?.seconds-b.createdAt?.seconds);
  renderUserSelect();
  renderUserList();
}

async function loadBookings() {
  const dk = dateKey(currentDate);
  const q = query(collection(db,'bookings'),where('date','==',dk));
  const snap = await getDocs(q);
  bookings = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

async function loadDisabledSpots() {
  // date='' means permanent (until manually re-enabled)
  const snap = await getDocs(collection(db,'disabledSpots'));
  disabledSpots = {};
  snap.docs.forEach(d=>{ disabledSpots[d.data().spotId]=d.id; });
}

async function addBookingDB(spotId,start,end) {
  await addDoc(collection(db,'bookings'),{
    spotId, date:dateKey(currentDate), userName:currentUser, startTime:start, endTime:end, createdAt:new Date()
  });
}

async function deleteBookingDB(id) {
  await deleteDoc(doc(db,'bookings',id));
}

async function addMemberDB(name,role) {
  await addDoc(collection(db,'members'),{name,role,createdAt:new Date()});
}

async function deleteMemberDB(id) {
  await deleteDoc(doc(db,'members',id));
}

async function setSpotDisabledDB(spotId,disabled) {
  if(disabled) {
    await addDoc(collection(db,'disabledSpots'),{spotId});
  } else {
    const existId = disabledSpots[spotId];
    if(existId) await deleteDoc(doc(db,'disabledSpots',existId));
  }
}

// ===== REALTIME =====
function setupRealtime() {
  const dk = dateKey(currentDate);
  onSnapshot(query(collection(db,'bookings'),where('date','==',dk)), snap=>{
    bookings = snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });
  onSnapshot(collection(db,'disabledSpots'), snap=>{
    disabledSpots = {};
    snap.docs.forEach(d=>{ disabledSpots[d.data().spotId]=d.id; });
    render();
  });
  setInterval(()=>{
    const newDk = dateKey(currentDate);
    if(newDk!==dk) { location.reload(); }
  }, 60000);
}

// ===== USER MANAGEMENT =====
function renderUserSelect() {
  const sel = document.getElementById('userSelect');
  sel.innerHTML = members.map(u=>`<option value="${u.name}">${u.name}</option>`).join('');
  if(!currentUser && members.length>0) currentUser=members[0].name;
  if(currentUser) sel.value=currentUser;
  document.getElementById('userInitial').textContent=currentUser?currentUser.charAt(0):'?';
}

function renderUserList() {
  const list=document.getElementById('userList');
  if(members.length===0){list.innerHTML='<div style="color:var(--text3);font-size:13px;text-align:center;padding:10px;">\u30e1\u30f3\u30d0\u30fc\u304c\u3044\u307e\u305b\u3093</div>';return;}
  list.innerHTML=members.map(u=>`
    <div class="user-item">
      <div class="user-avatar" style="width:24px;height:24px;font-size:10px;flex-shrink:0;">${u.name.charAt(0)}</div>
      <div class="user-item-name">${u.name}</div>
      <span class="user-item-role ${u.role==='staff'?'role-staff':'role-part'}">${u.role==='staff'?'\u793e\u54e1':'\u30d0\u30a4\u30c8'}</span>
      <button class="user-item-btn" onclick="removeUser('${u.id}','${u.name}')">&#x2715;</button>
    </div>`).join('');
}

window.togglePanel = id=>{
  const p=document.getElementById(id);
  p.classList.toggle('open');
  if(p.classList.contains('open')&&id==='adminPanel'){
    const opts=SPOTS.map(s=>`<option value="${s.id}">${s.num} ${s.note||s.area}</option>`).join('');
    document.getElementById('adminSpotSelect').innerHTML=opts;
    document.getElementById('adminBookingSpot').innerHTML=opts;
    document.getElementById('adminPhotoSpot').innerHTML=opts;
    updatePhotoPreview();
  }
};

window.changeUser=()=>{
  currentUser=document.getElementById('userSelect').value;
  document.getElementById('userInitial').textContent=currentUser.charAt(0);
  render();
};

window.addUser=async()=>{
  const n=document.getElementById('newUserName').value.trim();
  const r=document.getElementById('newUserRole').value;
  if(!n){showToast('\u540d\u524d\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044','error');return;}
  if(members.some(u=>u.name===n)){showToast('\u540c\u3058\u540d\u524d\u304c\u65e2\u306b\u3044\u307e\u3059','error');return;}
  showLoading();
  await addMemberDB(n,r);
  document.getElementById('newUserName').value='';
  await loadMembers();
  hideLoading();
  showToast(`${n} \u3092\u8ffd\u52a0\u3057\u307e\u3057\u305f`,'success');
};

window.removeUser=async(id,name)=>{
  if(name===currentUser){showToast('\u73fe\u5728\u30ed\u30b0\u30a4\u30f3\u4e2d\u306f\u524a\u9664\u3067\u304d\u307e\u305b\u3093','error');return;}
  showLoading();
  await deleteMemberDB(id);
  await loadMembers();
  hideLoading();
  showToast(`${name} \u3092\u524a\u9664\u3057\u307e\u3057\u305f`,'success');
};

// ===== DATE =====
function updateDateDisplay() {
  const d=currentDate;
  const wd=['\u65e5','\u6708','\u706b','\u6c34','\u6728','\u91d1','\u571f'][d.getDay()];
  document.getElementById('currentDateDisplay').textContent=`${d.getFullYear()}\u5e74${d.getMonth()+1}\u6708${d.getDate()}\u65e5\uff08${wd}\uff09`;
  document.getElementById('datePicker').value=dateKey(d);
}

window.changeDate=async delta=>{
  currentDate.setDate(currentDate.getDate()+delta);
  updateDateDisplay();
  showLoading();
  await Promise.all([loadDisabledSpots(),loadBookings()]);
  hideLoading();
  setupRealtime();
};

window.setDate=async val=>{
  const p=val.split('-');
  currentDate=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  updateDateDisplay();
  showLoading();
  await Promise.all([loadDisabledSpots(),loadBookings()]);
  hideLoading();
  setupRealtime();
};

// ===== RENDER =====
function getBookingsForSpot(spotId) {
  return bookings.filter(b=>b.spotId===spotId);
}

function render() {
  const areas=[...new Set(SPOTS.map(s=>s.area))];
  let html='',avail=0,taken=0,mine=0;
  areas.forEach(area=>{
    const areaSpots=SPOTS.filter(s=>s.area===area);
    html+=`<div class="section"><div class="section-header">
      <div class="section-title">${area}</div><div class="section-line"></div>
      <div class="section-badge">${areaSpots.length}\u53f0</div>
    </div><div class="parking-grid">`;
    areaSpots.forEach(spot=>{
      const bks=getBookingsForSpot(spot.id);
      const myBookings=bks.filter(b=>b.userName===currentUser);
      const otherBookings=bks.filter(b=>b.userName!==currentUser);
      const isDisabled=!!disabledSpots[spot.id];
      let cls='available';
      if(isDisabled) cls='disabled';
      else if(myBookings.length>0){cls='mine';mine++;}
      else if(otherBookings.length>0){cls='taken';taken++;}
      else avail++;

      const timeSlotsHtml=bks.length>0?'<div class="time-slots">'+bks.map(b=>
        `<div class="time-slot ${b.userName===currentUser?'my-slot':'booked'}">${b.startTime}\uff5e${b.endTime}</div>`
      ).join('')+'</div>':'';
      const tagHtml=(spot.type==='kei'
        ?'<span class="spot-tag tag-kei">\u8efd\u5c02\u7528</span>'
        :'<span class="spot-tag tag-normal">\u666e\u901a\u8eca\u53ef</span>')
        +(spot.timeLimit?` <span class="spot-tag tag-time">&#x23F0; ${spot.timeLimit}</span>`:'');
      const statusHtml=isDisabled
        ?'<div class="disabled-badge">&#x1F6AB; \u4f7f\u7528\u4e0d\u53ef</div>'
        :myBookings.length>0
        ?myBookings.map(b=>`<div class="spot-mine-badge">&#x2713; ${b.startTime}\uff5e${b.endTime}</div>`).join('')
        :otherBookings.length>0?`<div class="spot-user">&#x1F464; ${otherBookings.map(b=>b.userName).join(', ')}</div>`:'';
      const photo=getSpotPhoto(spot.id);
      const photoHtml=photo?`<img src="${photo}" class="spot-photo" onclick="event.stopPropagation();openPhotoModal('${photo}')" alt="">`:'';

      html+=`<div class="spot ${cls}" onclick="handleSpotClick(${spot.id})">
        <div class="spot-number">${spot.num}</div>
        <div class="spot-label">${spot.note||spot.area}</div>
        ${tagHtml}${timeSlotsHtml}${statusHtml}${photoHtml}
      </div>`;
    });
    html+='</div></div>';
  });
  document.getElementById('parkingContent').innerHTML=html;
  document.getElementById('statAvail').textContent=avail;
  document.getElementById('statTaken').textContent=taken;
  document.getElementById('statMine').textContent=mine;
}

// ===== ADMIN =====
window.setSpotDisabled=async disabled=>{
  const spotId=parseInt(document.getElementById('adminSpotSelect').value);
  const spot=SPOTS.find(s=>s.id===spotId);
  showLoading();
  await setSpotDisabledDB(spotId,disabled);
  await loadDisabledSpots();
  render();
  hideLoading();
  showToast(`${spot.num} \u3092${disabled?'\u4f7f\u7528\u4e0d\u53ef':'\u4f7f\u7528\u53ef'}\u306b\u3057\u307e\u3057\u305f`,'success');
};

window.loadAdminBookings=()=>{
  const spotId=parseInt(document.getElementById('adminBookingSpot').value);
  const bks=getBookingsForSpot(spotId);
  const list=document.getElementById('adminBookingList');
  if(bks.length===0){list.innerHTML='<div style="color:var(--text3);font-size:13px;text-align:center;padding:10px;">\u4e88\u7d04\u306f\u3042\u308a\u307e\u305b\u3093</div>';return;}
  list.innerHTML=bks.map(b=>`
    <div class="booking-item">
      <div class="booking-item-info">&#x1F464; ${b.userName}\u3000${b.startTime}\uff5e${b.endTime}</div>
      <button class="booking-item-del" onclick="adminDeleteBooking('${b.id}')">&#x2715;</button>
    </div>`).join('');
};

window.adminDeleteBooking=async id=>{
  showLoading();
  await deleteBookingDB(id);
  await loadBookings();
  loadAdminBookings();
  hideLoading();
  showToast('\u4e88\u7d04\u3092\u524a\u9664\u3057\u307e\u3057\u305f','success');
};

// ===== PHOTO =====
function getSpotPhoto(spotId){return localStorage.getItem(`spotPhoto_${spotId}`);}
window.updatePhotoPreview=()=>{
  const id=document.getElementById('adminPhotoSpot').value;
  const p=getSpotPhoto(id);
  document.getElementById('photoPreview').innerHTML=p
    ?`<img src="${p}" style="width:100%;height:100px;object-fit:cover;border-radius:8px;">`
    :'<div style="color:var(--text3);font-size:12px;padding:4px 0;">\u5199\u771f\u672a\u767b\u9332</div>';
};
window.uploadSpotPhoto=()=>{
  const file=document.getElementById('photoUpload').files[0];
  if(!file)return;
  if(file.size>2*1024*1024){showToast('2MB\u4ee5\u4e0b\u306e\u5199\u771f\u3092\u9078\u3093\u3067\u304f\u3060\u3055\u3044','error');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const id=document.getElementById('adminPhotoSpot').value;
    localStorage.setItem(`spotPhoto_${id}`,e.target.result);
    updatePhotoPreview();render();
    showToast('\u5199\u771f\u3092\u767b\u9332\u3057\u307e\u3057\u305f','success');
  };
  reader.readAsDataURL(file);
};
window.deleteSpotPhoto=()=>{
  const id=document.getElementById('adminPhotoSpot').value;
  localStorage.removeItem(`spotPhoto_${id}`);
  updatePhotoPreview();render();
  showToast('\u5199\u771f\u3092\u524a\u9664\u3057\u307e\u3057\u305f','success');
};
window.openPhotoModal=src=>{document.getElementById('photoModalImg').src=src;document.getElementById('photoModal').classList.add('active');};
window.closePhotoModal=()=>document.getElementById('photoModal').classList.remove('active');

// ===== MODAL =====
window.handleSpotClick=spotId=>{
  if(disabledSpots[spotId]){showToast('\u672c\u65e5\u4f7f\u7528\u4e0d\u53ef\u306b\u8a2d\u5b9a\u3055\u308c\u3066\u3044\u307e\u3059','error');return;}
  const spot=SPOTS.find(s=>s.id===spotId);
  const bks=getBookingsForSpot(spotId);
  const myBookings=bks.filter(b=>b.userName===currentUser);
  const otherBookings=bks.filter(b=>b.userName!==currentUser);
  const timeNote=spot.timeLimit?`<div style="background:rgba(212,160,0,0.1);border:1px solid rgba(212,160,0,0.3);color:var(--yellow);border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:14px;">&#x26A0; ${spot.timeLimit} \u306e\u307f\u4f7f\u7528\u53ef\u80fd\uff08\u5148\u4e88\u7d04OK\uff09</div>`:'';
  const keiNote=spot.type==='kei'?`<div style="background:rgba(108,68,244,0.1);border:1px solid rgba(108,68,244,0.3);color:var(--accent2);border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:14px;">&#x1F697; \u8efd\u81ea\u52d5\u8eca\u5c02\u7528</div>`:'';
  let myHtml='';
  if(myBookings.length>0){
    myHtml='<div style="margin-bottom:14px;"><div style="font-size:11px;color:var(--text3);margin-bottom:6px;">\u81ea\u5206\u306e\u4e88\u7d04</div>'+
      myBookings.map(b=>`<div style="display:flex;align-items:center;justify-content:space-between;background:rgba(59,126,240,0.06);border:1px solid rgba(59,126,240,0.2);border-radius:8px;padding:8px 12px;margin-bottom:6px;">
        <span style="font-size:13px;color:var(--accent);">&#x2713; ${b.startTime}\uff5e${b.endTime}</span>
        <button onclick="cancelBooking('${b.id}',${spotId})" style="background:rgba(224,68,68,0.12);border:1px solid rgba(224,68,68,0.3);color:var(--red);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'Noto Sans JP',sans-serif;">\u30ad\u30e3\u30f3\u30bb\u30eb</button>
      </div>`).join('')+'</div>';
  }
  let otherHtml='';
  if(otherBookings.length>0){
    otherHtml='<div style="margin-bottom:14px;"><div style="font-size:11px;color:var(--text3);margin-bottom:6px;">\u4ed6\u306e\u4e88\u7d04</div>'+
      otherBookings.map(b=>`<div style="background:rgba(224,68,68,0.06);border:1px solid rgba(224,68,68,0.2);border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:12px;color:var(--text2);">
        &#x1F464; ${b.userName}\u3000${b.startTime}\uff5e${b.endTime}
      </div>`).join('')+'</div>';
  }
  const body=`${timeNote}${keiNote}${myHtml}${otherHtml}
    <div class="form-group"><label class="form-label">\u65b0\u3057\u304f\u4e88\u7d04\u3059\u308b</label>
    <div class="time-range">
      <input type="time" class="form-input" id="startTime" value="09:00">
      <div class="time-range-sep">\uff5e</div>
      <input type="time" class="form-input" id="endTime" value="22:00">
    </div></div>`;
  showModal(`${spot.num} \u306e\u4e88\u7d04`,spot.name,body,[
    {label:'\u4e88\u7d04\u3059\u308b',cls:'btn-primary',action:`confirmBooking(${spotId})`},
    {label:'\u9589\u3058\u308b',cls:'btn-secondary',action:'closeModal()'}
  ]);
};

function showModal(title,subtitle,body,actions){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalSubtitle').textContent=subtitle;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalActions').innerHTML=actions.map(a=>
    `<button class="btn ${a.cls}" onclick="${a.action}">${a.label}</button>`).join('');
  document.getElementById('modal').classList.add('active');
}
window.closeModal=()=>document.getElementById('modal').classList.remove('active');
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))window.closeModal();});

window.confirmBooking=async spotId=>{
  const start=document.getElementById('startTime').value;
  const end=document.getElementById('endTime').value;
  const spot=SPOTS.find(s=>s.id===spotId);
  if(start>=end){showToast('\u7d42\u4e86\u6642\u9593\u306f\u958b\u59cb\u6642\u9593\u3088\u308a\u5f8c\u306b\u3057\u3066\u304f\u3060\u3055\u3044','error');return;}
  const bks=getBookingsForSpot(spotId);
  const overlap=bks.find(b=>start<b.endTime&&end>b.startTime);
  if(overlap){showToast(`${overlap.startTime}\uff5e${overlap.endTime}\u306e\u6642\u9593\u5e2f\u306f\u65e2\u306b\u4e88\u7d04\u6e08\u307f\u3067\u3059`,'error');return;}
  window.closeModal();showLoading();
  await addBookingDB(spotId,start,end);
  hideLoading();
  showToast(`${spot.num} \u3092\u4e88\u7d04\u3057\u307e\u3057\u305f (${start}\uff5e${end})`,'success');
};

window.cancelBooking=async(id,spotId)=>{
  const spot=SPOTS.find(s=>s.id===spotId);
  window.closeModal();showLoading();
  await deleteBookingDB(id);
  hideLoading();
  showToast(`${spot.num} \u306e\u4e88\u7d04\u3092\u30ad\u30e3\u30f3\u30bb\u30eb\u3057\u307e\u3057\u305f`,'success');
};

// ===== UTILS =====
function showLoading(){document.getElementById('loadingOverlay').classList.remove('hidden');}
function hideLoading(){document.getElementById('loadingOverlay').classList.add('hidden');}
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('ja-JP');}

// ===== INIT =====
async function init(){
  updateClock();
  setInterval(updateClock,1000);
  updateDateDisplay();
  showLoading();
  await loadMembers();
  await loadDisabledSpots();
  await loadBookings();
  hideLoading();
  setupRealtime();
}

init();
</script>
</body>
</html>
